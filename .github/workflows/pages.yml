name: Pages

# Deploys the GitHub Pages site: the landing page in docs/ PLUS a Debian/APT
# repository under /apt built from the .deb assets attached to every GitHub
# Release. Users can then:
#   curl -fsSL https://actuallyroy.github.io/aether-editor/apt/aether.gpg.key \
#     | sudo gpg --dearmor -o /usr/share/keyrings/aether.gpg
#   echo "deb [signed-by=/usr/share/keyrings/aether.gpg] \
#     https://actuallyroy.github.io/aether-editor/apt stable main" \
#     | sudo tee /etc/apt/sources.list.d/aether.list
#   sudo apt update && sudo apt install aether
#
# Requires the repo's Pages source set to "GitHub Actions" (Settings → Pages).
# For a SIGNED repo, add an ASCII-armored GPG private key as the repo Actions
# secret APT_GPG_PRIVATE_KEY. Without it the repo is published unsigned and
# users must add `[trusted=yes]` to the sources line instead of `signed-by=`.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "install.sh"
      - ".github/workflows/pages.yml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (landing page + install script)
        run: |
          mkdir -p _site
          cp -r docs/. _site/
          # Make the installer curl-able from the Pages domain.
          cp install.sh _site/install.sh

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils gnupg

      - name: Collect .deb assets from all releases
        run: |
          mkdir -p _site/apt/pool/main
          tags="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName -q '.[].tagName')"
          if [ -z "$tags" ]; then
            echo "No releases yet — publishing an empty APT repo."
          fi
          for tag in $tags; do
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" \
              --pattern '*.deb' --dir _site/apt/pool/main --skip-existing || true
          done
          echo "Packages collected:"; ls -la _site/apt/pool/main || true

      - name: Build APT repository metadata
        run: |
          cd _site/apt
          mkdir -p dists/stable/main/binary-amd64
          # Index every .deb in the pool. Paths in Packages are relative to here.
          dpkg-scanpackages --arch amd64 --multiversion pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9kf dists/stable/main/binary-amd64/Packages
          # Top-level Release with hashes of the Packages indices.
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Aether" \
            -o APT::FTPArchive::Release::Label="Aether" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            release dists/stable > dists/stable/Release
          cat dists/stable/main/binary-amd64/Packages

      - name: Sign repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          cd _site/apt
          if [ -z "${APT_GPG_PRIVATE_KEY:-}" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY not set — publishing an UNSIGNED repo."
            echo "Users must use: deb [trusted=yes] <url> stable main"
            exit 0
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          keyid="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          # Detached + inline signatures apt looks for.
          gpg --batch --yes --default-key "$keyid" -abs \
            -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --default-key "$keyid" --clearsign \
            -o dists/stable/InRelease dists/stable/Release
          # Public key for users to trust (ASCII-armored).
          gpg --armor --export "$keyid" > aether.gpg.key
          echo "Signed with key $keyid"

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
